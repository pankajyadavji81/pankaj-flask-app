<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pankaj's Flask App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-slate-200 font-sans">

    <nav class="fixed w-full z-50 glass top-0 left-0">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                FlaskMaster
            </div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="/" class="hover:text-blue-400 transition">Home</a>
                <a href="/about" class="hover:text-blue-400 transition">About</a>
                <a href="/project" class="hover:text-blue-400 transition">Projects</a>
                <a href="/contact" class="hover:text-blue-400 transition">Contact</a>

            </div>
            <a href="https://github.com/pankajyadavji81" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-lg text-sm font-semibold transition shadow-lg shadow-blue-500/20">
                GitHub
            </a>
        </div>
    </nav>

    <main class="pt-20">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-10 text-center border-t border-white/5 mt-20">
        <p class="text-slate-500 text-sm">© 2026 Pankaj Python Dev. Built with Flask & Tailwind.</p>
    </footer>

</body>
</html>
